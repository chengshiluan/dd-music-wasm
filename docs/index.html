<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顶点音乐 DD Music - 全网VIP音乐免费听</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23e60026'/%3E%3Cstop offset='100%25' style='stop-color:%23ff4757'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='48' fill='url(%23g)'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='40' font-family='sans-serif' fill='white'%3E♫%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#e60026"/>
                            <stop offset="100%" style="stop-color:#ff4757"/>
                        </linearGradient>
                    </defs>
                    <circle cx="50" cy="50" r="48" fill="url(#logoGrad)"/>
                    <text x="50" y="62" text-anchor="middle" font-size="40" font-family="sans-serif" fill="white">♫</text>
                </svg>
                <span class="logo-text">顶点音乐</span>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索歌曲、歌手、专辑..." autocomplete="off">
                <button id="searchBtn" class="btn-search">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                </button>
            </div>
            <button id="neteaseImportBtn" class="btn-import" title="导入网易云歌单">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                </svg>
                <span class="btn-import-text">导入网易云歌单</span>
            </button>
        </div>
    </header>

    <!-- NetEase import modal -->
    <div class="modal-overlay" id="importModal" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <span>导入网易云歌单</span>
                <button class="modal-close" id="closeImportModal">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <input type="text" id="playlistIdInput" placeholder="输入网易云歌单ID或分享链接..." class="modal-input">
                <p class="modal-hint">支持歌单ID（如 3778678）或分享链接</p>
                <button id="importPlaylistBtn" class="btn-primary">导入歌单</button>
                <div class="loading" id="importLoading" style="display:none;">
                    <div class="spinner"></div><span>导入中...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Platform tabs -->
    <nav class="platform-tabs" id="platformTabs">
        <button class="platform-tab active" data-platform="bilibili" style="--platform-color: #fb7299;">🔥 B站</button>
        <button class="platform-tab" data-platform="netease" style="--platform-color: #e60026;">网易云</button>
        <button class="platform-tab" data-platform="qq" style="--platform-color: #31c27c;">QQ音乐</button>
        <button class="platform-tab" data-platform="kugou" style="--platform-color: #2e8bff;">酷狗</button>
        <button class="platform-tab" data-platform="kuwo" style="--platform-color: #ffcc00;">酷我</button>
        <button class="platform-tab" data-platform="migu" style="--platform-color: #e5004f;">咪咕</button>
    </nav>

    <!-- Main content -->
    <div class="main-container">
        <div class="content-panel">
            <div class="panel-header">
                <span id="resultTitle">热门推荐</span>
                <span id="resultCount" class="result-count"></span>
            </div>
            <div class="loading" id="loading" style="display:none;">
                <div class="spinner"></div><span>搜索中...</span>
            </div>
            <div class="song-list" id="songList" style="display:none;"></div>
            <!-- Chart sections -->
            <div class="charts-container" id="chartsContainer">
                <div class="chart-section" id="chartBilibili">
                    <div class="chart-header">
                        <span class="chart-title">🔥 B站热门音乐</span>
                        <button class="chart-play-all" data-chart="bilibili">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 全部播放
                        </button>
                    </div>
                    <div class="chart-songs" id="chartSongsBilibili">
                        <div class="chart-loading"><div class="spinner"></div></div>
                    </div>
                </div>
                <div class="chart-section" id="chartNetease">
                    <div class="chart-header">
                        <span class="chart-title" style="color:#e60026;">🎵 网易云热歌榜</span>
                        <button class="chart-play-all" data-chart="netease">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 全部播放
                        </button>
                    </div>
                    <div class="chart-songs" id="chartSongsNetease">
                        <div class="chart-loading"><div class="spinner"></div></div>
                    </div>
                </div>
                <div class="chart-section" id="chartQQ">
                    <div class="chart-header">
                        <span class="chart-title" style="color:#31c27c;">🎶 QQ音乐热门</span>
                        <button class="chart-play-all" data-chart="qq">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 全部播放
                        </button>
                    </div>
                    <div class="chart-songs" id="chartSongsQQ">
                        <div class="chart-loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Playlist sidebar -->
        <aside class="playlist-panel" id="playlistPanel">
            <div class="panel-header">
                <span>播放列表</span>
                <span class="result-count" id="playlistCount">0</span>
                <button class="btn-clear" id="clearPlaylist" title="清空">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                    </svg>
                </button>
            </div>
            <div class="playlist-songs" id="playlistSongs">
                <div class="empty-state small">
                    <p>播放列表为空</p>
                    <p class="sub">点击歌曲旁的 + 添加</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- Player bar -->
    <div class="player-bar" id="playerBar">
        <div class="player-left">
            <img class="player-cover" id="playerCover" src="" alt="">
            <div class="player-info">
                <div class="player-title" id="playerTitle">未在播放</div>
                <div class="player-artist" id="playerArtist">选择一首歌曲开始播放</div>
            </div>
        </div>
        <div class="player-center">
            <div class="player-controls">
                <button class="ctrl-btn" id="btnPrev" title="上一首">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="ctrl-btn ctrl-play" id="btnPlay" title="播放/暂停">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="ctrl-btn" id="btnNext" title="下一首">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
            <div class="progress-bar-container">
                <span class="time" id="currentTime">00:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                    <div class="progress-thumb" id="progressThumb"></div>
                </div>
                <span class="time" id="duration">00:00</span>
            </div>
        </div>
        <div class="player-right">
            <button class="ctrl-btn" id="btnVolume" title="静音">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" id="volumeIcon">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
            </button>
            <div class="volume-bar" id="volumeBar">
                <div class="volume-fill" id="volumeFill"></div>
            </div>
            <span class="platform-badge" id="platformBadge"></span>
        </div>
    </div>

    <audio id="audio"></audio>
    <script type="module" src="js/app.js"></script>
</body>
</html>
